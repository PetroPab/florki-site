  <ellipse cx="485" cy="328" rx="28" ry="18" fill="#3F5D3A" opacity="0.8" transform="rotate(20 485 328)"/>
  <ellipse cx="400" cy="308" rx="22" ry="32" fill="#5A8F5C" opacity="0.9" transform="rotate(-5 400 308)"/>
  <!-- Glass dome outline -->
