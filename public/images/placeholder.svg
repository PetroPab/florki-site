  <path d="M305,555 Q305,420 400,380 Q495,420 495,555" fill="none" stroke="#C4BBA8" stroke-width="2"/>
  <!-- Moss dots -->
  <circle cx="350" cy="548" r="5" fill="#5A8F5C" opacity="0.5"/>
  <circle cx="370" cy="552" r="4" fill="#3F5D3A" opacity="0.4"/>
  <circle cx="420" cy="550" r="6" fill="#5A8F5C" opacity="0.5"/>
  <circle cx="445" cy="546" r="4" fill="#3F5D3A" opacity="0.4"/>
  <circle cx="400" cy="555" r="5" fill="#5A8F5C" opacity="0.3"/>
</svg>
